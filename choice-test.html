<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#315f5a" />
<title>Lil Lofty｜選擇與配音稿測試</title>
<style>
:root{--bg:#f4f0e9;--card:#fffdf9;--text:#282522;--muted:#706b64;--line:#ded7ce;--primary:#315f5a;--soft:#e1eeeb;--soft2:#f2eee7;--danger:#9c4747;--radius:20px;--shadow:0 14px 36px rgba(60,45,30,.08)}
*{box-sizing:border-box}body{margin:0;color:var(--text);background:linear-gradient(180deg,#faf7f1 0%,var(--bg) 100%);font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;line-height:1.6}.wrap{max-width:760px;margin:0 auto;padding:18px 15px 70px}header{padding:12px 4px 6px}h1{font-size:28px;line-height:1.2;margin:0 0 8px}h2{font-size:21px;margin:0 0 8px}.sub,.note{color:var(--muted)}.sub{font-size:15px}.note{font-size:13px;margin-top:8px}.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin:14px 0}.step{display:none}.step.active{display:block}.progress{height:8px;background:#e9e3da;border-radius:999px;overflow:hidden;margin:12px 0 4px}.progress>div{height:100%;width:0;background:var(--primary);transition:width .25s ease}.step-label{font-size:13px;color:var(--muted)}label{display:block;font-weight:700;margin:14px 0 7px}input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;color:var(--text);border-radius:14px;padding:13px 14px;font-size:16px;outline:none}textarea{min-height:140px;resize:vertical}input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--soft)}video{width:100%;max-height:500px;border-radius:16px;background:#111;display:none;margin-top:14px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px}.choice{border:1px solid var(--line);background:#fff;border-radius:15px;padding:13px;text-align:left;color:var(--text);font-weight:700;cursor:pointer}.choice small{display:block;font-weight:400;color:var(--muted);margin-top:4px}.choice.selected{border-color:var(--primary);background:var(--soft);color:var(--primary)}.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px}button{border:0;border-radius:14px;padding:13px 15px;font-size:16px;font-weight:700;background:var(--primary);color:#fff;cursor:pointer}button.secondary{background:var(--soft);color:var(--primary)}button.ghost{background:#ece8e1;color:var(--text)}button.danger{background:#f1dfdf;color:var(--danger)}.summary{background:#fff;border:1px solid var(--line);border-radius:14px;padding:14px;margin-top:12px;white-space:pre-wrap}.version{border:1px solid var(--line);border-radius:16px;padding:15px;margin:12px 0;background:#fff}.version h3{margin:0 0 8px;font-size:17px}.version.selected{border-color:var(--primary);background:var(--soft)}.feedback{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}.feedback button{padding:8px 10px;font-size:13px;background:var(--soft2);color:var(--text);border:1px solid var(--line)}.status{min-height:24px;margin-top:10px;font-size:14px;color:var(--primary)}@media(max-width:560px){.choices,.actions{grid-template-columns:1fr}h1{font-size:26px}}
</style>
</head>
<body>
<div class="wrap">
<header><h1>Lil Lofty｜選擇與配音稿測試</h1><div class="sub">一步一步完成影片描述，再選出比較像自己的配音稿。</div><div class="progress"><div id="progressBar"></div></div><div class="step-label" id="stepLabel">第 1／7 步</div></header>
<section class="card step active" data-step="1"><h2>先從影片開始</h2><div class="note">可以選影片，也可以先跳過，直接整理文字。</div><label for="videoFile">選擇影片</label><input id="videoFile" type="file" accept="video/*" /><video id="video" controls playsinline></video><div id="videoInfo" class="summary">尚未選擇影片。</div><div class="actions"><button onclick="nextStep()">開始整理</button><button class="secondary" onclick="nextStep()">暫時不選影片</button></div></section>
<section class="card step" data-step="2"><h2>這支影片最想說什麼？</h2><div class="choices" data-single="focus"><button class="choice" data-value="前後變化">前後變化<small>重點放在原始狀況與完成後差異。</small></button><button class="choice" data-value="操作過程">操作過程<small>重點放在工作方式與處理過程。</small></button><button class="choice" data-value="完成後效果">完成後效果<small>重點放在完成後的髮流與質感。</small></button><button class="choice" data-value="工作日常">工作日常<small>比較像輕鬆的工作紀錄。</small></button><button class="choice" data-value="客人整體造型">客人整體造型<small>重點放在整體輪廓與造型感。</small></button><button class="choice" data-value="還不確定">我還不確定<small>先保留，之後再調整。</small></button></div><div class="actions"><button class="ghost" onclick="prevStep()">上一步</button><button onclick="nextStep()">下一步</button></div></section>
<section class="card step" data-step="3"><h2>這次實際做了什麼？</h2><div class="note">這一題是事實確認，可以複選。</div><div class="choices" data-multi="service"><button class="choice" data-value="剪髮">剪髮</button><button class="choice" data-value="染髮">染髮</button><button class="choice" data-value="漂髮">漂髮</button><button class="choice" data-value="燙髮">燙髮</button><button class="choice" data-value="縮毛矯正">縮毛矯正</button><button class="choice" data-value="護髮">護髮</button><button class="choice" data-value="吹整">吹整</button><button class="choice" data-value="造型整理">造型整理</button></div><label for="serviceOther">其他或補充</label><input id="serviceOther" placeholder="例如：漂後髮縮毛矯正、局部調整" /><div class="actions"><button class="ghost" onclick="prevStep()">上一步</button><button onclick="nextStep()">下一步</button></div></section>
<section class="card step" data-step="4"><h2>原本有哪些狀況？</h2><div class="choices" data-multi="condition"><button class="choice" data-value="毛躁">毛躁</button><button class="choice" data-value="自然捲">自然捲</button><button class="choice" data-value="髮流不整齊">髮流不整齊</button><button class="choice" data-value="髮尾乾燥">髮尾乾燥</button><button class="choice" data-value="漂後髮">漂後髮</button><button class="choice" data-value="染後髮">染後髮</button><button class="choice" data-value="較蓬鬆">較蓬鬆</button><button class="choice" data-value="不描述原始狀況">不描述原始狀況</button></div><label for="conditionOther">其他或補充</label><input id="conditionOther" placeholder="例如：捲度不一致、髮尾較散" /><div class="actions"><button class="ghost" onclick="prevStep()">上一步</button><button onclick="nextStep()">下一步</button></div></section>
<section class="card step" data-step="5"><h2>完成後最想強調什麼？</h2><div class="choices" data-single="result"><button class="choice" data-value="整體更平順">整體更平順</button><button class="choice" data-value="髮流更整齊">髮流更整齊</button><button class="choice" data-value="保留自然感">保留自然感</button><button class="choice" data-value="輪廓更清楚">輪廓更清楚</button><button class="choice" data-value="日常更好整理">日常更好整理</button><button class="choice" data-value="完成後的質感">完成後的質感</button><button class="choice" data-value="不特別強調">不特別強調</button><button class="choice" data-value="自己補充">我想自己寫</button></div><label for="resultOther">自己補充</label><input id="resultOther" placeholder="例如：不追求很直，保留自然蓬鬆感" /><div class="actions"><button class="ghost" onclick="prevStep()">上一步</button><button onclick="nextStep()">下一步</button></div></section>
<section class="card step" data-step="6"><h2>哪一種說話方式比較像你？</h2><div class="choices" data-single="tone"><button class="choice" data-value="平常聊天">平常聊天<small>今天幫客人整理一下原本比較明顯的毛躁和髮流。</small></button><button class="choice" data-value="安靜分享">安靜分享<small>這次想慢慢整理原本的毛躁，也保留自然的感覺。</small></button><button class="choice" data-value="清楚說明">清楚說明<small>這次主要處理毛躁與髮流，操作會依不同區域調整。</small></button><button class="choice" data-value="作品紀錄">作品紀錄<small>這次記錄的是漂後髮縮毛矯正的整理過程。</small></button></div><label for="duration">配音長度</label><select id="duration"><option value="15">15 秒</option><option value="30" selected>30 秒</option><option value="60">60 秒</option><option value="auto">依影片長度</option></select><div class="actions"><button class="ghost" onclick="prevStep()">上一步</button><button onclick="generateVersions()">產生三個版本</button></div></section>
<section class="card step" data-step="7"><h2>選一個比較像你的版本</h2><div id="facts" class="summary"></div><div id="versions"></div><label for="finalDraft">最後配音稿</label><textarea id="finalDraft" placeholder="選擇版本後，可直接修改。"></textarea><div class="actions"><button onclick="saveDraft()">保存</button><button class="secondary" onclick="copyDraft()">複製配音稿</button><button class="ghost" onclick="prevStep()">重新選擇</button><button class="danger" onclick="resetAll()">全部清除</button></div><div id="status" class="status"></div><div class="note">這一版先測試選擇與文字流程，尚未接入正式 AI 配音。</div></section>
</div>
<script>
let currentStep=1;const totalSteps=7;const state={focus:"",service:[],condition:[],result:"",tone:"",chosenVersion:""};const progressBar=document.getElementById("progressBar"),stepLabel=document.getElementById("stepLabel"),statusBox=document.getElementById("status");function updateProgress(){progressBar.style.width=`${currentStep/totalSteps*100}%`;stepLabel.textContent=`第 ${currentStep}／${totalSteps} 步`}function showStep(step){document.querySelectorAll(".step").forEach(el=>el.classList.remove("active"));document.querySelector(`.step[data-step="${step}"]`)?.classList.add("active");currentStep=step;updateProgress();window.scrollTo({top:0,behavior:"smooth"})}function nextStep(){if(currentStep<totalSteps)showStep(currentStep+1)}function prevStep(){if(currentStep>1)showStep(currentStep-1)}
document.querySelectorAll("[data-single]").forEach(group=>group.querySelectorAll(".choice").forEach(btn=>btn.addEventListener("click",()=>{group.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"));btn.classList.add("selected");state[group.dataset.single]=btn.dataset.value})));document.querySelectorAll("[data-multi]").forEach(group=>group.querySelectorAll(".choice").forEach(btn=>btn.addEventListener("click",()=>{btn.classList.toggle("selected");state[group.dataset.multi]=[...group.querySelectorAll(".choice.selected")].map(b=>b.dataset.value)})));
const videoFile=document.getElementById("videoFile"),video=document.getElementById("video"),videoInfo=document.getElementById("videoInfo");let videoUrl=null;videoFile.addEventListener("change",()=>{const file=videoFile.files?.[0];if(!file)return;if(videoUrl)URL.revokeObjectURL(videoUrl);videoUrl=URL.createObjectURL(file);video.src=videoUrl;video.style.display="block";video.onloadedmetadata=()=>{const min=Math.floor(video.duration/60),sec=Math.round(video.duration%60).toString().padStart(2,"0");videoInfo.textContent=`檔名：${file.name}\n長度：${min}:${sec}\n大小：${(file.size/1024/1024).toFixed(1)} MB`}});
function joinList(list,other){const values=[...list];if(other?.trim())values.push(other.trim());return values.filter(Boolean)}function getFacts(){const services=joinList(state.service,document.getElementById("serviceOther").value),conditions=joinList(state.condition,document.getElementById("conditionOther").value),resultOther=document.getElementById("resultOther").value.trim(),result=state.result==="自己補充"&&resultOther?resultOther:(state.result||resultOther||"不特別強調"),duration=document.getElementById("duration").value;return{services,conditions,result,duration}}
function makeScripts(){const{services,conditions,result,duration}=getFacts(),serviceText=services.length?services.join("、"):"這次的服務",conditionText=conditions.length&&!conditions.includes("不描述原始狀況")?conditions.join("、"):"原本的髮況",focus=state.focus||"這次的整理過程",tone=state.tone||"平常聊天";let A=`這次做的是${serviceText}。原本比較明顯的是${conditionText}，這次主要想讓${result}。`,B=`這次記錄的是${focus}。先看客人原本的${conditionText}，再依照實際髮況安排${serviceText}。完成後，希望整體能${result}。`,C=`今天想簡單記錄一下這次的${serviceText}。原本有${conditionText}，所以操作上會比較注意不同區域的狀況。最後保留真實的完成感，也讓整體${result}。`;if(tone==="安靜分享"){A=`這次想慢慢整理原本的${conditionText}。做了${serviceText}，希望完成後可以${result}。`;B=`這次先從客人原本的${conditionText}開始看。依照不同區域的狀況進行${serviceText}，最後讓整體${result}。`;C=`有些整理，不需要一下子改變很多。這次從${conditionText}開始，慢慢完成${serviceText}，最後保留自然感，也讓整體${result}。`}else if(tone==="清楚說明"){A=`這次服務為${serviceText}，主要針對${conditionText}進行整理，完成後重點是${result}。`;B=`本次重點為${focus}。先確認${conditionText}，再依不同區域調整${serviceText}的處理方式，完成後呈現${result}。`;C=`這次主要處理${conditionText}，並進行${serviceText}。操作過程依實際髮況調整，最後讓整體${result}。`}else if(tone==="作品紀錄"){A=`作品紀錄。這次完成${serviceText}，原始狀況包含${conditionText}，完成後重點是${result}。`;B=`本次作品記錄的是${focus}。從${conditionText}開始，經過${serviceText}，最後呈現${result}。`;C=`這次留下的是${serviceText}的整理過程。原本有${conditionText}，完成後希望保留自然感，也讓整體${result}。`}if(duration==="15"){A=A.slice(0,70);B=B.slice(0,85);C=C.slice(0,90)}return[A,B,C]}
function generateVersions(){showStep(7);const{services,conditions,result,duration}=getFacts();document.getElementById("facts").textContent=[`主要重點：${state.focus||"尚未選擇"}`,`實際服務：${services.join("、")||"尚未填寫"}`,`原始狀況：${conditions.join("、")||"尚未填寫"}`,`完成後變化：${result}`,`說話方式：${state.tone||"尚未選擇"}`,`配音長度：${duration==="auto"?"依影片長度":duration+" 秒"}`].join("\n");const labels=["版本 A｜簡短直接","版本 B｜有一點過程","版本 C｜比較生活感"],scripts=makeScripts(),container=document.getElementById("versions");container.innerHTML="";scripts.forEach((text,i)=>{const box=document.createElement("div");box.className="version";box.innerHTML=`<h3>${labels[i]}</h3><div>${text}</div><div class="feedback"><button type="button" data-action="choose">選這個</button><button type="button" data-action="formal">太正式</button><button type="button" data-action="ad">太像廣告</button><button type="button" data-action="long">太長</button><button type="button" data-action="focus">沒有說到重點</button></div>`;box.querySelector('[data-action="choose"]').onclick=()=>{document.querySelectorAll(".version").forEach(v=>v.classList.remove("selected"));box.classList.add("selected");state.chosenVersion=labels[i];document.getElementById("finalDraft").value=text;setStatus(`已選擇：${labels[i]}`)};box.querySelector('[data-action="formal"]').onclick=()=>applyFeedback(text,"formal");box.querySelector('[data-action="ad"]').onclick=()=>applyFeedback(text,"ad");box.querySelector('[data-action="long"]').onclick=()=>applyFeedback(text,"long");box.querySelector('[data-action="focus"]').onclick=()=>applyFeedback(text,"focus");container.appendChild(box)})}
function applyFeedback(text,type){let revised=text;if(type==="formal"){revised=revised.replace(/本次/g,"這次").replace(/進行/g,"做").replace(/呈現/g,"看起來").replace(/針對/g,"主要整理");setStatus("已改成比較口語的版本。")}else if(type==="ad"){revised=revised.replace(/質感/g,"感覺").replace(/呈現/g,"看起來").replace(/希望整體能/g,"最後讓整體").replace(/保留真實的完成感，也/g,"");setStatus("已減少較像廣告的語氣。")}else if(type==="long"){revised=revised.split("。").filter(Boolean).slice(0,2).join("。")+"。";setStatus("已縮短內容。")}else if(type==="focus"){revised=`這次最想記錄的是${state.focus||"完成後的變化"}。`+revised;setStatus("已把主要重點放到前面。")}document.getElementById("finalDraft").value=revised}
function setStatus(message){statusBox.textContent=message}function saveDraft(){localStorage.setItem("lilLoftyChoiceDraft",JSON.stringify({savedAt:new Date().toISOString(),state,facts:getFacts(),finalDraft:document.getElementById("finalDraft").value}));setStatus("已保存到這台裝置。")}async function copyDraft(){const text=document.getElementById("finalDraft").value.trim();if(!text){setStatus("目前沒有可複製的配音稿。");return}try{await navigator.clipboard.writeText(text);setStatus("已複製配音稿。")}catch{setStatus("無法自動複製，請長按文字後手動複製。")}}function resetAll(){localStorage.removeItem("lilLoftyChoiceDraft");location.reload()}window.addEventListener("load",()=>{updateProgress();const saved=localStorage.getItem("lilLoftyChoiceDraft");if(saved){try{const data=JSON.parse(saved);if(data.finalDraft)document.getElementById("finalDraft").value=data.finalDraft}catch(e){}}});
</script>
</body>
</html>
