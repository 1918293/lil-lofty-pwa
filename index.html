<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#315f5a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Lil Lofty" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Lil Lofty Offline</title>
  <style>
    :root{
      --bg:#f4f0e9; --card:#fffdf9; --text:#282522; --muted:#706b64;
      --line:#ded7ce; --primary:#315f5a; --soft:#e1eeeb; --danger:#9c4747;
      --radius:20px; --shadow:0 14px 36px rgba(60,45,30,.08);
    }
    *{box-sizing:border-box}
    html{background:var(--bg)}
    body{
      margin:0; color:var(--text); line-height:1.65;
      font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
      background:linear-gradient(180deg,#faf7f1 0%,var(--bg) 100%);
    }
    .wrap{max-width:780px;margin:0 auto;padding:18px 15px 70px}
    header{padding:14px 4px 8px}
    h1{font-size:30px;line-height:1.2;margin:0 0 7px}
    .sub,.note{color:var(--muted)}
    .sub{font-size:15px}.note{font-size:13px;margin-top:8px}
    .card{
      background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:18px; margin:14px 0;
    }
    label{display:block;font-weight:700;margin:14px 0 7px}
    select,input,textarea{
      width:100%; border:1px solid var(--line); background:#fff; color:var(--text);
      border-radius:14px; padding:13px 14px; font-size:16px; outline:none;
    }
    textarea{min-height:116px;resize:vertical}
    select:focus,input:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--soft)}
    .checks{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .check{
      display:flex;align-items:center;gap:9px;border:1px solid var(--line);
      border-radius:13px;padding:10px 12px;background:#fff;font-weight:500;margin:0;
    }
    .check input{width:18px;height:18px;margin:0}
    .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
    button{
      border:0;border-radius:14px;padding:13px 15px;font-size:16px;font-weight:700;
      background:var(--primary);color:#fff;cursor:pointer
    }
    button.secondary{background:var(--soft);color:var(--primary)}
    button.ghost{background:#ece8e1;color:var(--text)}
    button.danger{background:#f1dfdf;color:var(--danger)}
    .output{
      white-space:pre-wrap;background:#fff;border:1px solid var(--line);
      border-radius:14px;padding:16px;min-height:240px;font-size:15px
    }
    .status{font-size:14px;margin-top:10px;min-height:24px;color:var(--primary)}
    .install{display:none}
    @media(max-width:560px){.checks,.actions{grid-template-columns:1fr}h1{font-size:27px}}
  </style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Lil Lofty Offline</h1>
    <div class="sub">離線產生字幕、IG 貼文、封面與 Hashtag</div>
  </header>

  <section class="card install" id="installCard">
    <strong>加入主畫面</strong>
    <div class="note">在 Safari 點「分享」→「加入主畫面」，即可像 App 一樣開啟。</div>
  </section>

  <section class="card">
    <label for="service">服務項目</label>
    <select id="service">
      <option>縮毛矯正</option><option>剪髮</option><option>染髮</option><option>漂髮</option>
      <option>挑染</option><option>燙髮</option><option>護髮</option><option>頭皮護理</option>
      <option>造型整理</option><option>綜合服務</option><option>其他</option>
    </select>

    <label for="detail">服務細項</label>
    <input id="detail" placeholder="例如：漂後髮調整、冷棕色染髮" />

    <label>客人原始狀況</label>
    <div class="checks" id="conditions">
      <label class="check"><input type="checkbox" value="自然捲">自然捲</label>
      <label class="check"><input type="checkbox" value="毛躁">毛躁</label>
      <label class="check"><input type="checkbox" value="髮尾乾燥">髮尾乾燥</label>
      <label class="check"><input type="checkbox" value="漂後髮">漂後髮</label>
      <label class="check"><input type="checkbox" value="染後髮">染後髮</label>
      <label class="check"><input type="checkbox" value="髮流不整齊">髮流不整齊</label>
      <label class="check"><input type="checkbox" value="希望減少整理時間">希望減少整理時間</label>
      <label class="check"><input type="checkbox" value="不描述原始狀況">不描述原始狀況</label>
    </div>

    <label for="treatment">實際施作內容</label>
    <textarea id="treatment" placeholder="請只輸入真實完成的內容，例如：依不同區域的髮況調整處理方式，以整理髮流與降低毛躁感為主要方向。"></textarea>

    <label for="result">成果描述</label>
    <select id="result">
      <option>髮流較整齊</option><option>毛躁感較不明顯</option><option>整體輪廓較柔順</option>
      <option>髮尾線條較集中</option><option>日常整理較簡單</option><option>保留自然蓬鬆感</option>
      <option>視覺上更有光澤</option><option>整體質感較一致</option><option>不特別描述成果</option>
    </select>

    <label for="tone">語氣</label>
    <select id="tone">
      <option>自然中性</option><option>專業簡潔</option><option>溫柔生活感</option>
      <option>作品紀錄</option><option>簡短口語</option>
    </select>

    <label for="duration">字幕長度</label>
    <select id="duration">
      <option value="15">15 秒</option><option value="30">30 秒</option><option value="60">60 秒</option>
    </select>

    <div class="actions">
      <button onclick="generate()">產生內容</button>
      <button class="secondary" onclick="saveDraft()">儲存草稿</button>
      <button class="ghost" onclick="loadDraft()">載入草稿</button>
      <button class="danger" onclick="clearAll()">清除</button>
    </div>
    <div class="note">所有輸入與草稿只儲存在目前裝置。</div>
    <div id="status" class="status"></div>
  </section>

  <section class="card">
    <label>產出結果</label>
    <div id="output" class="output">尚未產生內容。</div>
    <div class="actions">
      <button onclick="copyOutput()">複製全部</button>
      <button class="secondary" onclick="shareOutput()">分享</button>
      <button class="ghost" onclick="downloadTxt()">下載文字檔</button>
    </div>
  </section>
</div>

<script>
const hashtagMap={
"縮毛矯正":"#Lofty #縮毛矯正 #毛躁整理 #髮流調整 #髮型作品 #髮型紀錄",
"剪髮":"#Lofty #剪髮 #髮型設計 #髮型作品 #髮型紀錄",
"染髮":"#Lofty #染髮 #髮色設計 #髮型作品 #髮型紀錄",
"漂髮":"#Lofty #漂髮 #漂髮作品 #髮色設計 #髮型紀錄",
"挑染":"#Lofty #挑染 #髮色設計 #髮型作品 #髮型紀錄",
"燙髮":"#Lofty #燙髮 #捲髮造型 #髮型作品 #日常整理",
"護髮":"#Lofty #護髮 #髮質管理 #髮型紀錄",
"頭皮護理":"#Lofty #頭皮護理 #日常保養 #髮型紀錄",
"造型整理":"#Lofty #造型整理 #髮型作品 #日常整理",
"綜合服務":"#Lofty #髮型設計 #髮型作品 #髮型紀錄",
"其他":"#Lofty #髮型作品 #髮型設計 #髮型紀錄"};

function selectedConditions(){return [...document.querySelectorAll('#conditions input:checked')].map(x=>x.value)}
function opening(t,s,d){const n=d?`${s}・${d}`:s;return{
"自然中性":`這次進行了${n}。`,
"專業簡潔":`本次服務項目為${n}。`,
"溫柔生活感":`這次從日常整理的需要出發，進行了${n}。`,
"作品紀錄":`本次作品紀錄｜${n}`,
"簡短口語":`今天完成的是${n}。`}[t]}

function subtitle(d,title,c,t,r){
  const cond=c.length?c.join("、"):"依實際髮況評估";
  if(d==="15")return `00:00–00:03\n${title}\n\n00:03–00:07\n原始狀況｜${cond}\n\n00:07–00:12\n${t}\n\n00:12–00:15\n完成後｜${r}`;
  if(d==="60")return `00:00–00:05\n${title}\n\n00:05–00:12\n原始狀況｜${cond}\n\n00:12–00:20\n先確認不同區域的髮況\n\n00:20–00:32\n${t}\n\n00:32–00:42\n依照實際狀況調整處理方式\n\n00:42–00:52\n完成後｜${r}\n\n00:52–01:00\n實際維持仍依髮質與居家整理而不同`;
  return `00:00–00:04\n${title}\n\n00:04–00:10\n原始狀況｜${cond}\n\n00:10–00:18\n依照實際髮況安排處理方式\n\n00:18–00:25\n${t}\n\n00:25–00:30\n完成後｜${r}`;
}

function generate(){
  const s=document.getElementById('service').value;
  const d=document.getElementById('detail').value.trim();
  const c=selectedConditions();
  const t=document.getElementById('treatment').value.trim();
  const r=document.getElementById('result').value;
  const tone=document.getElementById('tone').value;
  const dur=document.getElementById('duration').value;
  if(!t){status("請先輸入實際施作內容。");return}
  const title=d||s;
  const ct=(!c.length||c.includes("不描述原始狀況"))
    ?"這次主要依照希望呈現的輪廓與日常整理需求進行調整。"
    :`原始狀況包含${c.join("、")}，這次依照實際髮況安排處理方式。`;
  const rt=r==="不特別描述成果"
    ?"實際呈現與後續維持情況，仍會依個人髮質、原有髮況與居家整理方式而有所不同。"
    :`完成後，主要呈現為${r}。實際維持情況仍會依個人髮質與居家整理方式而有所不同。`;
  const ig=`${opening(tone,s,d)}\n\n${ct}\n\n${t}\n\n${rt}`;
  const out=`【影片封面】\n\n${title}\n\n\n【影片字幕】\n\n${subtitle(dur,title,c,t,r)}\n\n\n【IG 貼文】\n\n${ig}\n\n\n【Hashtag】\n\n${hashtagMap[s]||hashtagMap["其他"]}`;
  document.getElementById('output').textContent=out;
  localStorage.setItem('lilLoftyLastOutput',out);
  status("內容已產生。");
}

function data(){return{
service:service.value,detail:detail.value,conditions:selectedConditions(),
treatment:treatment.value,result:result.value,tone:tone.value,duration:duration.value}}
function saveDraft(){localStorage.setItem('lilLoftyDraft',JSON.stringify(data()));status("草稿已儲存在此裝置。")}
function loadDraft(){
  const raw=localStorage.getItem('lilLoftyDraft');if(!raw){status("目前沒有本機草稿。");return}
  const d=JSON.parse(raw);service.value=d.service;detail.value=d.detail;treatment.value=d.treatment;
  result.value=d.result;tone.value=d.tone;duration.value=d.duration;
  document.querySelectorAll('#conditions input').forEach(x=>x.checked=d.conditions.includes(x.value));
  status("草稿已載入。");
}
function clearAll(){detail.value="";treatment.value="";document.querySelectorAll('#conditions input').forEach(x=>x.checked=false);output.textContent="尚未產生內容。";status("已清除目前內容。")}
async function copyOutput(){
  const text=output.textContent;
  try{await navigator.clipboard.writeText(text);status("已複製到剪貼簿。")}
  catch(e){status("請長按結果文字手動複製。")}
}
async function shareOutput(){
  const text=output.textContent;
  if(navigator.share){try{await navigator.share({title:"Lil Lofty",text});status("已開啟分享選單。")}catch(e){}}
  else{await copyOutput()}
}
function downloadTxt(){
  const blob=new Blob([output.textContent],{type:"text/plain;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);
  a.download=`LilLofty_${new Date().toISOString().slice(0,16).replace(/[:T]/g,"-")}.txt`;a.click();
  URL.revokeObjectURL(a.href);status("文字檔已建立。");
}
function status(m){document.getElementById('status').textContent=m}
window.addEventListener('load',()=>{
  const last=localStorage.getItem('lilLoftyLastOutput');if(last)output.textContent=last;
  if(!window.matchMedia('(display-mode: standalone)').matches)installCard.style.display='block';
});
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js'))}
</script>
</body>
</html>
